name: Daily Push Notification

# Fires the day's KJB verse to every subscribed device via sendDailyPush —
# runs on GitHub's servers, so it works whether or not anyone has the app
# open. Cron times are UTC; 11:00 UTC ≈ 7am US Eastern / 6am Central.
on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sendDailyPush
        run: |
          set -e
          URL="https://kingjamesbiblereader.com/functions/sendDailyPush"
          echo "POST $URL"
          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" -X POST "$URL" -H "Content-Type: application/json" -d '{}')
          echo "HTTP status: $HTTP_CODE"
          cat response.json
          echo
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "sendDailyPush failed with status $HTTP_CODE"
            exit 1
          fi
