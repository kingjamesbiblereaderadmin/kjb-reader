name: Build Android
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Generate Gradle wrapper (if missing)
        working-directory: android
        run: |
          if [ ! -f gradlew ]; then
            echo "No gradlew found — generating Gradle wrapper..."
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x gradlew || true
      - name: Generate signing keystore
        working-directory: android
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias appnative \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass appnative -keypass appnative \
            -dname "CN=AppNative, OU=Mobile, O=AppNative, L=, S=, C=US"
      - name: Build release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease
      - name: Zipalign & sign APK
        working-directory: android
        run: |
          BUILD_TOOLS_DIR=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)
          echo "Using build-tools: $BUILD_TOOLS_DIR"

          # Gradle may emit app-release-unsigned.apk or app-release.apk — handle both.
          IN_APK=app/build/outputs/apk/release/app-release-unsigned.apk
          if [ ! -f "$IN_APK" ]; then
            IN_APK=app/build/outputs/apk/release/app-release.apk
          fi
          echo "Input APK: $IN_APK"

          # 1) Zipalign (required before apksigner)
          "$BUILD_TOOLS_DIR/zipalign" -p -f 4 "$IN_APK" app-aligned.apk

          # 2) Sign with v1+v2+v3 so it installs on every Android version
          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks release.keystore \
            --ks-key-alias appnative \
            --ks-pass pass:appnative \
            --key-pass pass:appnative \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out app-release-signed.apk \
            app-aligned.apk

          # 3) Verify before shipping
          "$BUILD_TOOLS_DIR/apksigner" verify --verbose app-release-signed.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app-release-signed.apk
