plugins {
    id 'com.android.application'
    id 'kotlin-android'
}
android {
    namespace 'com.godisgracious1031m.kjbreader'
    compileSdk 34
    defaultConfig {
        applicationId "com.godisgracious1031m.kjbreader"
        minSdk 24
        targetSdk 34
        versionCode 3
        versionName "1.0.0"
    }
    buildTypes {
        release {
            // Signing handled in CI by apksigner (zipalign + v1/v2/v3) after build.
            // Keep R8/minify OFF — no proguard rules are shipped, so shrinking would
            // strip WebView classes and an unsigned/broken APK fails to install.
            minifyEnabled false
        }
    }
    compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }
    kotlinOptions { jvmTarget = '17' }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.webkit:webkit:1.10.0'
}