<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Detect Internet Explorer / very old browsers and redirect to the legacy
         reader BEFORE any modern JS runs (the React app can't run on IE). -->
    <script>
      (function () {
        try {
          var ua = navigator.userAgent || '';
          // IE10/11 ("Trident") and older IE ("MSIE"). Not Edge.
          var isIE = /Trident|MSIE/i.test(ua);
          // A dedicated legacy domain should ALWAYS land on the server-rendered
          // legacy reader, regardless of browser. Send every visitor straight
          // to the function endpoint (which the React /legacy page only redirects
          // to anyway).
          var legacyHost = (window.location.hostname || '').toLowerCase();
          var qsEarly = window.location.search || '';
          var optedOutEarly = qsEarly.indexOf('nolegacy=1') !== -1;
          var STATIC_LEGACY_FILE = 'https://media.base44.com/files/public/6a05d76723afe58d80c589e8/kjb-reader-legacy.html';
          // Static file redirect removed — legacy domains now serve the function page directly.
          // Only treat as "too old" if it's clearly NOT a modern browser.
          // The bare Promise/fetch check can misfire in some embedded/in-app
          // browsers, so we additionally require an old-IE-style userAgent.
          var tooOld = isIE && ((typeof window.Promise === 'undefined') || (typeof window.fetch === 'undefined'));
          // Parse query string manually (IE doesn't support URLSearchParams reliably)
          var qs = window.location.search || '';
          var optedOut = qs.indexOf('nolegacy=1') !== -1;
          // A ?tab= param AT THE ROOT path ("/") means a legacy deep link
          // (gospel/resources/about/debug) — route it to the server-rendered
          // legacy reader. Only fires on "/" so it never interferes with the
          // "/legacy" route's own ?tab= links/form submits.
          var atRoot = window.location.pathname === '/' || window.location.pathname === '';
          var wantsLegacyTab = atRoot && qs.indexOf('tab=') !== -1;

          // A direct visit to "/legacy" always means the server-rendered Full
          // Bible reader — send EVERY browser straight to the function endpoint
          // (the React /legacy page can't run on IE and only redirects anyway).
          if (window.location.pathname === '/legacy' && !optedOut) {
            var lHost = window.location.hostname || '';
            var lIsCustom = lHost.indexOf('base44.app') === -1 && lHost.indexOf('localhost') === -1;
            var lOrigin = window.location.origin || (window.location.protocol + '//' + window.location.host);
            if (lIsCustom) {
              window.location.replace(lOrigin + '/functions/legacy');
            } else {
              var lAppId = null;
              var lIdx = qs.indexOf('app_id=');
              if (lIdx !== -1) {
                var lPart = qs.substring(lIdx + 7);
                var lAmp = lPart.indexOf('&');
                lAppId = lAmp !== -1 ? lPart.substring(0, lAmp) : lPart;
              }
              if (!lAppId) { try { lAppId = localStorage.getItem('base44_app_id'); } catch (e) {} }
              window.location.replace(lAppId ? '/api/apps/' + lAppId + '/functions/legacy' : '/functions/legacy');
            }
            return;
          }
          if (wantsLegacyTab && !optedOut) {
            var tHost = window.location.hostname || '';
            var tIsCustom = tHost.indexOf('base44.app') === -1 && tHost.indexOf('localhost') === -1;
            if (tIsCustom) {
              window.location.replace(window.location.origin + '/legacy' + qs);
            } else {
              var tAppId = null;
              var tIdx = qs.indexOf('app_id=');
              if (tIdx !== -1) {
                var tPart = qs.substring(tIdx + 7);
                var tAmp = tPart.indexOf('&');
                tAppId = tAmp !== -1 ? tPart.substring(0, tAmp) : tPart;
              }
              if (!tAppId) { try { tAppId = localStorage.getItem('base44_app_id'); } catch (e) {} }
              window.location.replace((tAppId ? '/api/apps/' + tAppId + '/functions/legacy' : '/functions/legacy') + qs);
            }
            return;
          }
          if ((isIE || tooOld) && !optedOut) {
            var host = window.location.hostname || '';
            var isCustom = host.indexOf('base44.app') === -1 && host.indexOf('localhost') === -1;
            // IE8 lacks window.location.origin — build it manually as a fallback.
            var origin = window.location.origin || (window.location.protocol + '//' + window.location.host);
            var legacyUrl;
            if (isCustom) {
              legacyUrl = origin + '/functions/legacy';
            } else {
              var appId = null;
              var appIdx = qs.indexOf('app_id=');
              if (appIdx !== -1) {
                var appPart = qs.substring(appIdx + 7);
                var ampIdx = appPart.indexOf('&');
                appId = ampIdx !== -1 ? appPart.substring(0, ampIdx) : appPart;
              }
              if (!appId) {
                try { appId = localStorage.getItem('base44_app_id'); } catch (e) {}
              }
              legacyUrl = appId
                ? '/api/apps/' + appId + '/functions/legacy'
                : '/functions/legacy';
            }
            // Force immediate redirect before any rendering
            window.location.replace(legacyUrl);
          }
        } catch (e) {
          // If detection fails on an old browser, redirect STRAIGHT to the
          // server-rendered function (never the React /legacy page, which IE
          // can't run). Use the origin path which works on the custom domain.
          try {
            window.location.replace(window.location.origin + '/functions/legacy');
          } catch (e2) {
            try { window.location.replace('/functions/legacy'); } catch (e3) {}
          }
        }
      })();
    </script>
    <link rel="icon" type="image/png" href="https://media.base44.com/images/public/6a05d76723afe58d80c589e8/efb7b4ff3_launchericon-512x512.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Capture beforeinstallprompt early (Chrome/Edge/Samsung/Android mobile) -->
    <script>
      (function() {
        if (typeof window === 'undefined') return;
        // Set up global deferred prompt storage immediately
        window.kjbDeferredPrompt = null;
        window.kjbPromptFired = false;
        window.kjbPromptedThisSession = false;

        // Capture beforeinstallprompt as early as possible (mobile + desktop).
        // Chromium browsers (Chrome/Edge/Samsung Internet) only fire this event
        // for an app that is NOT currently installed — so seeing it fire is the
        // most reliable signal we have that any previously-remembered
        // "installed" flag is now stale (e.g. the user uninstalled the PWA from
        // their home screen/app list). Clearing it here is what makes the app
        // automatically fall back to showing the Install button again, without
        // the user having to manually reset anything.
        window.addEventListener('beforeinstallprompt', function(e) {
          e.preventDefault();
          window.kjbDeferredPrompt = e;
          window.kjbPromptFired = true;
          window.kjbPromptedThisSession = true;
          try { localStorage.removeItem('kjb-is-installed'); } catch (err) {}
          console.log('[PWA] beforeinstallprompt captured - not currently installed, native prompt ready');
          window.dispatchEvent(new Event('kjb-install-change'));
          window.dispatchEvent(new Event('pwa-installable'));
        });

        // Fires the moment the user accepts the native install prompt (or
        // installs via the browser's own address-bar/menu affordance).
        window.addEventListener('appinstalled', function() {
          console.log('[PWA] appinstalled event fired');
          window.kjbDeferredPrompt = null;
          window.kjbPromptFired = false;
          try {
            localStorage.setItem('kjb-is-installed', 'true');
            // Don't re-nag the install/welcome prompt after a successful install
            localStorage.setItem('kjb-prompt-dismissed', 'true');
            localStorage.setItem('kjb-install-dismissed', 'true');
          } catch (e) {}
          // Let the open browser tab (useInstallPrompt / FirstLoadPrompt /
          // InstallAppSection) flip to the "Installed" state immediately.
          window.dispatchEvent(new Event('storage'));
          window.dispatchEvent(new Event('kjb-install-change'));
        });
      })();
    </script>
    <!-- Allow caching for offline support -->
    <meta http-equiv="Cache-Control" content="public, max-age=3600, stale-while-revalidate=86400" />
    <title>KJB Reader</title>
    <!-- Preload critical resources -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Dancing+Script:wght@300;400;500;600;700&family=Great+Vibes&family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=block" />
    <meta name="description" content="Read the King James Bible (Pure Cambridge Edition) — the pure, infallible Word of God." />
    <meta name="theme-color" content="#0f1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KJB Reader" />
    <link rel="apple-touch-icon" href="https://media.base44.com/images/public/6a05d76723afe58d80c589e8/efb7b4ff3_launchericon-512x512.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Performance optimizations -->
    <link rel="preconnect" href="https://media.base44.com" crossorigin />
    <link rel="dns-prefetch" href="https://media.base44.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="description" content="Read the King James Bible (Pure Cambridge Edition) with offline support, daily verses, and beautiful typography." />
    <meta name="keywords" content="Bible, King James Bible, KJB, Pure Cambridge Edition, offline Bible, Christian, scripture" />
    <!-- PWA manifest: STABLE url is required for Chromium-based browsers
         (Edge, Chrome) to reliably evaluate install-eligibility. A per-load
         cache-busting timestamp here previously made the manifest URL
         different on every visit, which broke the "Add to Home Screen" /
         install prompt on Edge mobile. The version query param is still
         bumped manually on each deploy so updated manifests are picked up,
         but it no longer changes between loads of the same deployed build. -->
    <link rel="manifest" href="/manifest.json?v=20260713_1200" id="kjb-manifest-link" />
    <!-- Prevent flash of wrong theme: apply saved theme BEFORE React mounts -->
    <script>
      (function() {
        try {
          var mode = localStorage.getItem('kjb-theme-mode') || 'system';
          var isDark;
          if (mode === 'dark') isDark = true;
          else if (mode === 'light') isDark = false;
          else if (mode === 'auto') {
            var h = new Date().getHours();
            isDark = h < 6 || h >= 18;
          } else {
            isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          }
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
        try {
          // A shared link can carry ?font=dyslexic or ?font=hyperlegible —
          // persist it so the recipient opens (and stays) in that font mode.
          var qsFont = window.location.search || '';
          if (qsFont.indexOf('font=dyslexic') !== -1) {
            localStorage.setItem('kjb-a11y-font', 'dyslexic');
          } else if (qsFont.indexOf('font=hyperlegible') !== -1) {
            localStorage.setItem('kjb-a11y-font', 'hyperlegible');
          }
          var a11yFont = localStorage.getItem('kjb-a11y-font');
          if (a11yFont === 'dyslexic' || a11yFont === 'hyperlegible' || a11yFont === 'system') {
            document.documentElement.setAttribute('data-a11y-font', a11yFont);
          }
        } catch (e) {}
      })();
    </script>
    <style>
      /* Boot background matches the splash placeholder — light in light mode,
         dark in dark mode — to prevent a flash of the wrong color before React
         mounts. The inline theme script adds `html.dark` for dark mode. */
      html, body { background-color: #fef9f3; color: #0f1718; margin: 0; width: 100%; min-height: 100vh; }
      html.dark, html.dark body { background-color: #0f1117; color: #ffffff; }
      #root { min-height: 100vh; width: 100%; background-color: inherit; }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Static placeholder that EXACTLY matches the React SplashScreen's idle
           look (same logo size, progress bar, uppercase text) so there is no
           visual flash/jump when React mounts and takes over. Colors are theme
           aware: dark bg in dark mode, light bg in light mode. The inline theme
           script above adds the `dark` class before this renders, so we read it
           and set the splash colors here before paint. -->
      <div id="kjb-boot-splash" style="position:fixed;inset:0;z-index:999999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0f1117;">
        <div style="display:flex;flex-direction:column;align-items:center;margin-top:-4rem;gap:48px;">
          <img
            id="kjb-boot-logo"
            src="https://media.base44.com/images/public/6a05d76723afe58d80c589e8/efb7b4ff3_launchericon-512x512.png"
            alt="KJB Reader Logo"
            style="width:11rem;height:11rem;object-fit:contain;border-radius:1rem;padding:0.75rem;background:#0f1117;"
          />
          <div style="display:flex;flex-direction:column;align-items:center;gap:20px;width:16rem;">
            <div id="kjb-boot-track" style="width:100%;height:6px;border-radius:9999px;overflow:hidden;position:relative;background:rgba(255,255,255,0.08);">
              <div style="position:absolute;top:0;height:100%;border-radius:9999px;width:40%;background:#4f6aff;animation:kjb-boot-indeterminate 1.2s ease-in-out infinite;"></div>
            </div>
            <span id="kjb-boot-text" style="font-family:Inter,system-ui,sans-serif;font-size:0.875rem;font-weight:300;letter-spacing:0.25em;text-transform:uppercase;text-align:center;color:#c8cdd8;">Loading KJB Reader...</span>
          </div>
        </div>
      </div>
      <script>
        (function () {
          try {
            if (!document.documentElement.classList.contains('dark')) {
              var bg = '#fef9f3';
              document.getElementById('kjb-boot-splash').style.background = bg;
              document.getElementById('kjb-boot-logo').style.background = bg;
              document.getElementById('kjb-boot-track').style.background = 'rgba(0,0,0,0.08)';
              document.getElementById('kjb-boot-text').style.color = '#5a6472';
            }
          } catch (e) {}
        })();
      </script>
      <style>
        @keyframes kjb-boot-indeterminate {
          0% { left: -40%; }
          100% { left: 100%; }
        }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
