<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://media.base44.com/images/public/6a05d76723afe58d80c589e8/8e738d108_cfb4bf781_Untitled.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Allow caching for offline support -->
    <meta http-equiv="Cache-Control" content="public, max-age=3600, stale-while-revalidate=86400" />
    <title>KJB Reader — Pure Cambridge Edition</title>
    <!-- Preload critical resources -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Dancing+Script:wght@300;400;500;600;700&family=Great+Vibes&family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap" as="style" />
    <meta name="description" content="Read the King James Bible (Pure Cambridge Edition) — the pure, infallible Word of God." />
    <meta name="theme-color" content="#fef9f3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1718" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KJB Reader" />
    <link rel="apple-touch-icon" href="https://media.base44.com/images/public/6a05d76723afe58d80c589e8/8e738d108_cfb4bf781_Untitled.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Performance optimizations -->
    <link rel="preconnect" href="https://media.base44.com" crossorigin />
    <link rel="dns-prefetch" href="https://media.base44.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="description" content="Read the King James Bible (Pure Cambridge Edition) with offline support, daily verses, and beautiful typography." />
    <meta name="keywords" content="Bible, King James Version, KJV, Pure Cambridge Edition, offline Bible, Christian, scripture" />
    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Prevent flash of wrong theme: apply saved theme BEFORE React mounts -->
    <script>
      (function() {
        try {
          var mode = localStorage.getItem('kjb-theme-mode') || 'system';
          var isDark;
          if (mode === 'dark') isDark = true;
          else if (mode === 'light') isDark = false;
          else if (mode === 'auto') {
            var h = new Date().getHours();
            isDark = h < 6 || h >= 18;
          } else {
            isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          }
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <style>
      html, body { background-color: #ffffff; margin: 0; width: 100%; min-height: 100vh; }
      html.dark, html.dark body { background-color: #0f1718; }
      #root { min-height: 100vh; width: 100%; background-color: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
