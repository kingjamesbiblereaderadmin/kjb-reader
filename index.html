<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Detect Internet Explorer / very old browsers and redirect to the legacy
         reader BEFORE any modern JS runs (the React app can't run on IE). -->
    <script>
      (function () {
        try {
          var ua = navigator.userAgent || '';
          // IE10/11 ("Trident") and older IE ("MSIE"). Not Edge.
          var isIE = /Trident|MSIE/i.test(ua);
          // Only treat as "too old" if it's clearly NOT a modern browser.
          // The bare Promise/fetch check can misfire in some embedded/in-app
          // browsers, so we additionally require an old-IE-style userAgent.
          var tooOld = isIE && ((typeof window.Promise === 'undefined') || (typeof window.fetch === 'undefined'));
          // Parse query string manually (IE doesn't support URLSearchParams reliably)
          var qs = window.location.search || '';
          var optedOut = qs.indexOf('nolegacy=1') !== -1;
          // A ?tab= param AT THE ROOT path ("/") means a legacy deep link
          // (gospel/resources/about/debug) — route it to the server-rendered
          // legacy reader. Only fires on "/" so it never interferes with the
          // "/legacy" route's own ?tab= links/form submits.
          var atRoot = window.location.pathname === '/' || window.location.pathname === '';
          var wantsLegacyTab = atRoot && qs.indexOf('tab=') !== -1;

          // A direct visit to "/legacy" always means the server-rendered Full
          // Bible reader — send EVERY browser straight to the function endpoint
          // (the React /legacy page can't run on IE and only redirects anyway).
          if (window.location.pathname === '/legacy' && !optedOut) {
            window.location.replace('https://media.base44.com/files/public/6a05d76723afe58d80c589e8/efdf106f1_kjb-legacy-reader.html');
            return;
          }
          if (wantsLegacyTab && !optedOut) {
            window.location.replace('https://media.base44.com/files/public/6a05d76723afe58d80c589e8/efdf106f1_kjb-legacy-reader.html');
            return;
          }
          if ((isIE || tooOld) && !optedOut) {
            window.location.replace('https://media.base44.com/files/public/6a05d76723afe58d80c589e8/efdf106f1_kjb-legacy-reader.html');
          }
        } catch (e) {
          try { window.location.replace('https://media.base44.com/files/public/6a05d76723afe58d80c589e8/efdf106f1_kjb-legacy-reader.html'); } catch (e2) {}
        }
      })();
    </script>
    <link rel="icon" type="image/png" href="https://media.base44.com/images/public/6a05d76723afe58d80c589e8/8e738d108_cfb4bf781_Untitled.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Allow caching for offline support -->
    <meta http-equiv="Cache-Control" content="public, max-age=3600, stale-while-revalidate=86400" />
    <title>KJB Reader — Pure Cambridge Edition</title>
    <!-- Preload critical resources -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Dancing+Script:wght@300;400;500;600;700&family=Great+Vibes&family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=block" />
    <meta name="description" content="Read the King James Bible (Pure Cambridge Edition) — the pure, infallible Word of God." />
    <meta name="theme-color" content="#fef9f3" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1718" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KJB Reader" />
    <link rel="apple-touch-icon" href="https://media.base44.com/images/public/6a05d76723afe58d80c589e8/8e738d108_cfb4bf781_Untitled.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Performance optimizations -->
    <link rel="preconnect" href="https://media.base44.com" crossorigin />
    <link rel="dns-prefetch" href="https://media.base44.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="description" content="Read the King James Bible (Pure Cambridge Edition) with offline support, daily verses, and beautiful typography." />
    <meta name="keywords" content="Bible, King James Bible, KJB, Pure Cambridge Edition, offline Bible, Christian, scripture" />
    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Prevent flash of wrong theme: apply saved theme BEFORE React mounts -->
    <script>
      window.kjbDeferredPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.kjbDeferredPrompt = e;
        window.dispatchEvent(new Event('pwa-installable'));
      });
      (function() {
        try {
          var mode = localStorage.getItem('kjb-theme-mode') || 'system';
          var isDark;
          if (mode === 'dark') isDark = true;
          else if (mode === 'light') isDark = false;
          else if (mode === 'auto') {
            var h = new Date().getHours();
            isDark = h < 6 || h >= 18;
          } else {
            isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          }
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
        try {
          var a11yFont = localStorage.getItem('kjb-a11y-font');
          if (a11yFont === 'dyslexic' || a11yFont === 'hyperlegible' || a11yFont === 'system') {
            document.documentElement.setAttribute('data-a11y-font', a11yFont);
          }
        } catch (e) {}
      })();
    </script>
    <style>
      html, body { background-color: #ffffff; color: #000000; margin: 0; width: 100%; min-height: 100vh; }
      html.dark, html.dark body { background-color: #0f1718; color: #ffffff; }
      #root { min-height: 100vh; width: 100%; background-color: inherit; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="fixed inset-0 z-[9999] bg-background flex flex-col items-center justify-center">
        <div class="flex flex-col items-center justify-center -mt-16 w-full max-w-sm px-6">
          <div class="relative mb-12">
            <div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full scale-150 animate-pulse"></div>
            <img 
              src="https://media.base44.com/images/public/6a05d76723afe58d80c589e8/8e738d108_cfb4bf781_Untitled.png" 
              alt="KJB Reader" 
              class="relative w-32 h-32 object-contain drop-shadow-xl"
            />
          </div>
          <div class="flex flex-col items-center gap-6 w-full">
            <div class="flex flex-col items-center gap-3 text-center">
              <svg class="w-6 h-6 animate-spin text-primary/70" style="animation-duration: 2s;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
              <span class="font-sans text-xs text-foreground/70 font-medium tracking-[0.2em] uppercase">Loading KJB Reader...</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
