<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e1b4b" />
  <title>KJB Reader — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f4ff;
      color: #1e1b4b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 1.5rem;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f0d24; color: #e0ddff; }
      .card { background: #1a1730; border-color: #2e2a50; }
    }
    .card {
      background: #fff;
      border: 1px solid #ddd8ff;
      border-radius: 1.25rem;
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(80,60,200,0.08);
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.9rem; opacity: 0.7; line-height: 1.6; margin-bottom: 1.5rem; }
    button {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 1.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📖</div>
    <h1>You're offline</h1>
    <p>The King James Bible app couldn't load. Make sure you've opened the app online at least once to cache it for offline use.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
