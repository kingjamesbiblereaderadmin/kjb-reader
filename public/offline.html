<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1623" />
    <title>King James Bible — Offline</title>
    <link rel="icon" type="image/png" href="https://media.base44.com/images/public/6a05d76723afe58d80c589e8/799704588_Untitled.png" />
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: 'Merriweather', Georgia, 'Times New Roman', serif;
        background: #f7f7f5;
        color: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0f1623; color: #e5e5e5; }
        .card { background: #1a2235; border-color: #2a3550; }
        button { background: #c89a4b; color: #0f1623; }
        .muted { color: #9aa5bd; }
      }
      .card {
        max-width: 480px;
        width: 100%;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 32px 24px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      }
      img.logo { width: 64px; height: 64px; border-radius: 12px; margin-bottom: 16px; }
      h1 { font-size: 1.5rem; margin: 0 0 8px; }
      p { margin: 8px 0; line-height: 1.5; }
      .muted { color: #6b7280; font-size: 0.9rem; }
      button {
        margin-top: 20px;
        background: #1a1a1a;
        color: #ffffff;
        border: 0;
        border-radius: 10px;
        padding: 12px 24px;
        font-size: 1rem;
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="https://media.base44.com/images/public/6a05d76723afe58d80c589e8/799704588_Untitled.png" alt="KJB" />
      <h1>You're offline</h1>
      <p>The app shell hasn't been cached yet. Connect to the internet once to load the app — after that, the Bible will work offline.</p>
      <p class="muted">If you've already opened the app before, try reloading.</p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
